name: TypeScript check

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  typeScript-check:
    name: check TypeScript Compilation
    runs-on: windows-latest

    steps:
      - name: checkout once
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit        

      